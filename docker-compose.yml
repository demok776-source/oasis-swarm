version: '3.8'

services:
  redis:
    image: redis:7.0-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - oasis-net

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:6333/collections || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - oasis-net

  postgres:
    image: postgres:15-alpine
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-oasis_admin}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - oasis-net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - oasis-net

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
    networks:
      - oasis-net

  # NOTE ON depends_on BELOW: previously every service used the bare form
  # (`depends_on: [redis, postgres, ...]`), which only waits for the
  # dependency's container to *start*, not for it to actually be ready to
  # accept connections (Postgres in particular can take several seconds
  # after container-start before it accepts connections). app-tier could
  # boot and immediately fail its first DB query. `condition:
  # service_healthy` (paired with the healthchecks above) fixes that.
  app-tier:
    build:
      context: ./app-tier
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - oasis-net

  telemetry-worker:
    build:
      context: ./app-tier
      dockerfile: Dockerfile
    command: ["python", "-m", "src.workers.telemetry_processor"]
    env_file:
      - .env
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - oasis-net

  mock-server:
    image: python:3.11-slim
    volumes:
      - .:/app
    working_dir: /app
    env_file:
      - .env
    command: python mock-server/server.py
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - oasis-net

  oasis-v5:
    build:
      context: ./oasis-v5
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - app-tier
    networks:
      - oasis-net

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11435:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - oasis-net

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    env_file:
      - .env
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - oasis-net

  solana-bot:
    build:
      context: ./crypto-bot
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      - app-tier
    networks:
      - oasis-net

  omniverse-bridge:
    build:
      context: ./nucleus-bridge
      dockerfile: Dockerfile
    ports:
      - "8765:8765"
    networks:
      - oasis-net

  rust-gateway:
    build:
      context: ./rust-gateway
      dockerfile: Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - oasis-net

volumes:
  redis_data:
  qdrant_data:
  postgres_data:
  ollama_data:
  grafana_data:

networks:
  oasis-net:
