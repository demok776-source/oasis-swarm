version: '3.8'

services:
  redis:
    image: redis:7.0-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - oasis-net

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - oasis-net

  postgres:
    image: postgres:15-alpine
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - oasis-net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - oasis-net

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    networks:
      - oasis-net

  app-tier:
    build:
      context: ./app-tier
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    env_file:
      - .env
    depends_on:
      - redis
      - qdrant
      - postgres
      - kafka
    networks:
      - oasis-net

  mock-server:
    image: python:3.11-slim
    volumes:
      - .:/app
    working_dir: /app
    env_file:
      - .env
    command: python mock-server/server.py
    ports:
      - "8000:8000"
    depends_on:
      - redis
    networks:
      - oasis-net

  oasis-v5:
    build:
      context: ./oasis-v5
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - app-tier
    networks:
      - oasis-net

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11435:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - oasis-net

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    networks:
      - oasis-net

  solana-bot:
    build:
      context: ./crypto-bot
      dockerfile: Dockerfile
    depends_on:
      - app-tier
    networks:
      - oasis-net

  omniverse-bridge:
    build:
      context: ./nucleus-bridge
      dockerfile: Dockerfile
    ports:
      - "8765:8765"
    networks:
      - oasis-net

volumes:
  redis_data:
  qdrant_data:
  postgres_data:
  ollama_data:
  grafana_data:

networks:
  oasis-net:
