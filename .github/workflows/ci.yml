name: OASIS System Core CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.11
      uses: actions/setup-python@v3
      with:
        python-version: "3.11"
    - name: Install backend dependencies
      run: |
        cd app-tier
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest
    - name: Run Backend Tests
      run: |
        pytest tests/test_mock_system.py

  build-frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'
        cache: 'npm'
        cache-dependency-path: './oasis-v5/package-lock.json'
    - name: Install frontend dependencies
      run: |
        cd oasis-v5
        npm ci
    - name: Build Next.js
      run: |
        cd oasis-v5
        npm run build
